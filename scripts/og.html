  html, body { margin: 0; padding: 0; }

  .card {
    width: 100%;

    grid-template-rows: auto 1fr auto;
    column-gap: 64px;
    row-gap: 20px;

    grid-column: 1 / 2;

    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 14px;
    font-weight: 500;
  }
  .dot {
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }
  .center {
    grid-column: 1 / 2;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;

  }

  }
  .portrait {

    width: 380px;
    height: auto;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    border-radius: 4px;
    border: 1px solid var(--rule);
    align-self: center;
  }
  .portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 25%;
    display: block;
  }
  .bottom {
    grid-column: 1 / 2;

    display: flex;
    align-items: center;
    gap: 22px;

    line-height: 1;
    white-space: nowrap;
  }
