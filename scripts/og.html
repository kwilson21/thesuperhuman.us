<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,400&family=Inter:wght@400;500;600&display=swap"
/>
<style>
  :root {
    --paper: #FBF8F2;
    --ink: #0E0E0E;
    --muted: #4A4A4A;
    --rule: #E8E3DA;
    --accent: #AE5534;
  }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Newsreader', Georgia, serif;
    box-sizing: border-box;
    overflow: hidden;
  }
  .card {
    width: 100%;
    height: 100%;
    padding: 72px 80px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    grid-template-rows: auto 1fr auto;
    column-gap: 72px;
    row-gap: 24px;
  }
  .eyebrow {
    grid-column: 1 / 2;
    grid-row: 1;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
  }
  .dot {
    width: 9px;
    height: 9px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }
  .center {
    grid-column: 1 / 2;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  h1 {
    font-size: 116px;
    line-height: 0.96;
    font-weight: 400;
    letter-spacing: -0.025em;
    margin: 0 0 24px 0;
    color: var(--ink);
  }
  .lede {
    font-size: 30px;
    line-height: 1.32;
    color: #2a2a2a;
    margin: 0;
    max-width: 14ch;
    font-weight: 400;
  }
  .lede em {
    font-style: italic;
  }
  .portrait {
    grid-column: 2;
    grid-row: 1 / 4;
    align-self: stretch;
    justify-self: end;
    width: 380px;
    height: auto;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    border-radius: 4px;
    border: 1px solid var(--rule);
    align-self: center;
  }
  .portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 25%;
    display: block;
  }
  .bottom {
    grid-column: 1 / 2;
    grid-row: 3;
    display: flex;
    align-items: center;
    gap: 18px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;
    color: var(--muted);
  }
  .logo-stamp {
    display: inline-flex;
    align-items: center;
    height: 44px;
    padding: 0 12px 0 8px;
    background: #F2D77E;
    border-radius: 6px;
    gap: 8px;
  }
  .logo-stamp img {
    height: 28px;
    width: auto;
    display: block;
  }
  .logo-stamp .name {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #0E0E0E;
    text-transform: uppercase;
  }
  .url {
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">
      <span class="dot"></span>
      Available for contract work · 2026
    </div>

    <div class="center">
      <h1>Kazon Wilson</h1>
      <p class="lede">Backend &amp; data engineer building production systems <em>across layers</em>.</p>
    </div>

    <div class="bottom">
      <span class="url">thesuperhuman.us</span>
      <span>·</span>
      <span class="logo-stamp">
        <img src="./logo.png" alt="The Superhuman Group" />
        <span class="name">The Superhuman Group LLC</span>
      </span>
    </div>

    <div class="portrait">
      <img src="../src/assets/headshot.jpg" alt="Kazon Wilson" />
    </div>
  </div>
</body>
</html>
